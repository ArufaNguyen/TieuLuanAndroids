<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Login</title>
<h3>Login</h3>
<p><a href="/tools.html">Tools</a> | <a href="/upload-har.html">Upload HAR</a> | <a href="/agent-chat.html">Agent Chat</a></p>
<label>Login name <input id="loginName" value="arufa"></label><br><br>
<label>Password <input id="password" type="password" value="123456"></label><br><br>
<button onclick="login()">Login</button>
<pre id="out"></pre>
<script>
async function login() {
  const res = await fetch('/api/v1/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      loginName: loginName.value,
      password: password.value
    })
  });
  const json = await res.json();
  if (json.code === 200) {
    localStorage.setItem('sessionToken', json.body.sessionToken);
    localStorage.setItem('userId', json.body.userId);
    out.textContent = 'Logged in as user ' + json.body.userId;
  } else {
    out.textContent = JSON.stringify(json, null, 2);
  }
}
</script>
</html>
